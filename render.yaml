# =============================================================================
# Blueprint Render — SOMENTE FrotaTMS
# =============================================================================
# Este arquivo NÃO faz deploy do FilaDock (Next.js / Vercel).
# FilaDock continua em: https://fila-lsl.vercel.app
#
# One-click:
#   https://render.com/deploy?repo=https://github.com/stefanybacelar18-boop/FILA-LS
#
# Ou: Render Dashboard → New → Blueprint → este repositório (render.yaml na raiz).
# =============================================================================

services:
  - type: web
    name: frota-tms
    runtime: node
    plan: free
    rootDir: frota-tms
    buildCommand: |
      chmod +x scripts/prepare-postgres-schema.sh
      npm install --prefix web && npm run build --prefix web
      npm install --prefix api
      ./scripts/prepare-postgres-schema.sh api/prisma/schema.prisma
      npx prisma generate --schema api/prisma/schema.prisma
      npm run build --prefix api
      mkdir -p api/public && cp -r web/dist/* api/public/
    startCommand: |
      cd api && npx prisma db push && node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: CORS_ORIGIN
        value: '*'
      - key: SEED_ON_START
        value: 'false'
      - key: FORCE_SEED
        value: 'false'
      - key: DATABASE_URL
        fromDatabase:
          name: frota-tms-db
          property: connectionString

databases:
  # Render permite só 1 Postgres free por workspace.
  # Se Create database falhar: Dashboard → Databases → apague o free antigo → Manual sync.
  - name: frota-tms-db
    plan: free
    postgresMajorVersion: '16'
