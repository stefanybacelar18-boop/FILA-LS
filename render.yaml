# =============================================================================
# Blueprint Render — SOMENTE FrotaTMS
# =============================================================================
# Este arquivo NÃO faz deploy do FilaDock (Next.js / Vercel).
# FilaDock continua em: https://fila-lsl.vercel.app
#
# One-click:
#   https://render.com/deploy?repo=https://github.com/stefanybacelar18-boop/FILA-LS
# =============================================================================

services:
  - type: web
    name: frota-tms
    runtime: node
    plan: free
    rootDir: frota-tms
    # NODE_ENV=production faz npm omitir devDeps — por isso o build força include=dev
    # e usa o Prisma LOCAL (api/node_modules), nunca o npx global (v7+).
    buildCommand: |
      set -e
      chmod +x scripts/prepare-postgres-schema.sh
      npm install --prefix web --include=dev
      npm run build --prefix web
      npm install --prefix api --include=dev
      ./scripts/prepare-postgres-schema.sh api/prisma/schema.prisma
      npm exec --prefix api -- prisma generate --schema api/prisma/schema.prisma
      npm run build --prefix api
      mkdir -p api/public && cp -r web/dist/. api/public/
    startCommand: |
      set -e
      cd api
      npm exec -- prisma db push
      if [ "${SEED_ON_START:-false}" = "true" ]; then
        echo "SEED_ON_START=true — bootstrap de dados (uma vez)..."
        FORCE_SEED=true npm exec -- tsx prisma/seed.ts
      fi
      node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: CORS_ORIGIN
        value: '*'
      # Free não tem Shell: use SEED_ON_START=true só no 1º bootstrap, depois false
      - key: SEED_ON_START
        value: 'false'
      - key: FORCE_SEED
        value: 'false'
      - key: BOOTSTRAP_ADMIN_EMAIL
        value: lsl@.com
      - key: BOOTSTRAP_ADMIN_PASSWORD
        value: lsl123
      - key: BOOTSTRAP_ADMIN_NAME
        value: LSL Admin
      - key: BOOTSTRAP_OPS_EMAIL
        value: ag@.com
      - key: BOOTSTRAP_OPS_PASSWORD
        value: ag123
      - key: BOOTSTRAP_OPS_NAME
        value: AG Operação
      - key: DATABASE_URL
        fromDatabase:
          name: frota-tms-db
          property: connectionString

databases:
  # Render permite só 1 Postgres free por workspace.
  - name: frota-tms-db
    plan: free
    postgresMajorVersion: '16'
