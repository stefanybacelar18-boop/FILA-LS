services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: frota
      POSTGRES_PASSWORD: frota
      POSTGRES_DB: frota_tms
    ports:
      - "5432:5432"
    volumes:
      - frota_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frota -d frota_tms"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://frota:frota@db:5432/frota_tms
      JWT_SECRET: change-me-in-production
      CORS_ORIGIN: http://localhost:5173
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  frota_pg:
