services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: file:./data/prod.db
      JWT_SECRET: change-me-in-production
      CORS_ORIGIN: http://localhost:5173
      PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      - frota_data:/app/data

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

  # Opcional: PostgreSQL para produção.
  # 1) Altere provider no schema.prisma para "postgresql"
  # 2) Defina DATABASE_URL=postgresql://frota:frota@db:5432/frota_tms na api
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: frota
  #     POSTGRES_PASSWORD: frota
  #     POSTGRES_DB: frota_tms
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - frota_pg:/var/lib/postgresql/data

volumes:
  frota_data:
